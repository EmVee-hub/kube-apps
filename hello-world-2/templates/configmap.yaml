apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-2-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Hello World 2</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 50px;
                background-color: #f0f0f0;
            }
            h1 {
                color: #EA4335;
            }
        </style>
    </head>
    <body>
        <h1>Hello from Kubernetes - Version 2!</h1>
        <p>This page is served from the hello-world-2 application.</p>
        <p>Managed by ArgoCD App-of-Apps pattern.</p>
    </body>
    </html>