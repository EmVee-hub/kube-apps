apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-3
  labels:
    app: hello-world-3
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: hello-world-3
  template:
    metadata:
      labels:
        app: hello-world-3
    spec:
      containers:
      - name: hello-world-3
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: hello-world-3-html